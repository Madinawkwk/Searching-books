{% extends "layout.html" %}
{% block title %}New post{% endblock %}
{% block content %}
    <h1>New post</h1>
    <form method="POST">
        {{ form.hidden_tag() }}
        <p>{{ form.title.label }}<br>{{ form.title(size=50) }}</p>
        <p>{{ form.content.label }}<br>{{ form.content(rows=10, cols=50) }}</p>
        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
