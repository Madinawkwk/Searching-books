services:
  web:
    build: .
    container_name: library-app
    ports:
      - "9000:5000"
    environment:
      - FLASK_APP=wsgi.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-key}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-your-github-client-id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-your-github-client-secret}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-your-yandex-client-id}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET:-your-yandex-client-secret}
      - DATABASE_URL=sqlite:////app/instance/library.db
    volumes:
      - ./instance:/app/instance
      - ./uploads:/app/static/uploads
    restart: unless-stopped